<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .weather-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .search-box {
            margin-bottom: 30px;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px;
            border: none;
            border-radius: 25px;
            background: #f5f5f5;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            background: #fff;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }

        .search-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .weather-info {
            display: none;
        }

        .weather-info.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .location {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .date {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .weather-icon {
            width: 100px;
            height: 100px;
            margin: 20px auto;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
        }

        .temperature {
            font-size: 48px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .description {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
            text-transform: capitalize;
        }

        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .detail-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .detail-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .forecast {
            margin-top: 30px;
            display: none;
        }

        .forecast.show {
            display: block;
        }

        .forecast-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }

        .forecast-items {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
        }

        .forecast-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            min-width: 80px;
            text-align: center;
        }

        .forecast-day {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .forecast-temp {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        @media (max-width: 480px) {
            .weather-container {
                padding: 20px;
                margin: 10px;
            }
            
            .temperature {
                font-size: 36px;
            }
            
            .weather-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="weather-container">
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name..." value="London">
            <button class="search-btn" onclick="getWeather()">Get Weather</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading weather data...</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="weather-info" id="weatherInfo">
            <div class="location" id="location">London</div>
            <div class="date" id="date">Monday, January 1, 2024</div>
            
            <div class="weather-icon" id="weatherIcon">☀️</div>
            
            <div class="temperature" id="temperature">22°C</div>
            <div class="description" id="description">Clear sky</div>
            
            <div class="weather-details">
                <div class="detail-item">
                    <div class="detail-label">Humidity</div>
                    <div class="detail-value" id="humidity">65%</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Wind Speed</div>
                    <div class="detail-value" id="windSpeed">5.2 km/h</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Pressure</div>
                    <div class="detail-value" id="pressure">1013 hPa</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Visibility</div>
                    <div class="detail-value" id="visibility">10 km</div>
                </div>
            </div>
        </div>

        <div class="forecast" id="forecast">
            <div class="forecast-title">5-Day Forecast</div>
            <div class="forecast-items" id="forecastItems">
                <!-- Forecast items will be added here -->
            </div>
        </div>
    </div>

    <script>
        // API Key - You'll need to get a free API key from OpenWeatherMap
        const API_KEY = 'YOUR_API_KEY_HERE'; // Replace with your actual API key
        const BASE_URL = 'https://api.openweathermap.org/data/2.5';

        // Weather icons mapping
        const weatherIcons = {
            '01d': '☀️', '01n': '🌙',
            '02d': '⛅', '02n': '☁️',
            '03d': '☁️', '03n': '☁️',
            '04d': '☁️', '04n': '☁️',
            '09d': '🌧️', '09n': '🌧️',
            '10d': '🌦️', '10n': '🌧️',
            '11d': '⛈️', '11n': '⛈️',
            '13d': '❄️', '13n': '❄️',
            '50d': '🌫️', '50n': '🌫️'
        };

        // Initialize app
        document.addEventListener('DOMContentLoaded', function() {
            // Get weather for default city
            getWeather();
            
            // Add enter key support
            document.getElementById('cityInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    getWeather();
                }
            });
        });

        async function getWeather() {
            const cityInput = document.getElementById('cityInput');
            const city = cityInput.value.trim();
            
            if (!city) {
                showError('Please enter a city name');
                return;
            }

            showLoading(true);
            hideError();
            hideWeatherInfo();

            try {
                // Get current weather
                const weatherData = await fetchWeatherData(city);
                displayWeather(weatherData);

                // Get 5-day forecast
                const forecastData = await fetchForecastData(city);
                displayForecast(forecastData);

                showWeatherInfo();
                showForecast();
            } catch (error) {
                console.error('Error fetching weather data:', error);
                showError('City not found. Please check the spelling and try again.');
            } finally {
                showLoading(false);
            }
        }

        async function fetchWeatherData(city) {
            const response = await fetch(
                `${BASE_URL}/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`
            );
            
            if (!response.ok) {
                throw new Error('City not found');
            }
            
            return await response.json();
        }

        async function fetchForecastData(city) {
            const response = await fetch(
                `${BASE_URL}/forecast?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`
            );
            
            if (!response.ok) {
                throw new Error('Forecast data not available');
            }
            
            return await response.json();
        }

        function displayWeather(data) {
            document.getElementById('location').textContent = `${data.name}, ${data.sys.country}`;
            document.getElementById('date').textContent = formatDate(new Date());
            document.getElementById('temperature').textContent = `${Math.round(data.main.temp)}°C`;
            document.getElementById('description').textContent = data.weather[0].description;
            document.getElementById('humidity').textContent = `${data.main.humidity}%`;
            document.getElementById('windSpeed').textContent = `${(data.wind.speed * 3.6).toFixed(1)} km/h`;
            document.getElementById('pressure').textContent = `${data.main.pressure} hPa`;
            document.getElementById('visibility').textContent = `${(data.visibility / 1000).toFixed(1)} km`;
            
            // Set weather icon
            const iconCode = data.weather[0].icon;
            document.getElementById('weatherIcon').textContent = weatherIcons[iconCode] || '🌤️';
        }

        function displayForecast(data) {
            const forecastItems = document.getElementById('forecastItems');
            forecastItems.innerHTML = '';

            // Get one forecast per day (every 8th item as data is in 3-hour intervals)
            const dailyForecasts = data.list.filter((item, index) => index % 8 === 0);

            dailyForecasts.forEach(forecast => {
                const date = new Date(forecast.dt * 1000);
                const day = formatDay(date);
                const temp = Math.round(forecast.main.temp);
                const iconCode = forecast.weather[0].icon;

                const forecastItem = document.createElement('div');
                forecastItem.className = 'forecast-item';
                forecastItem.innerHTML = `
                    <div class="forecast-day">${day}</div>
                    <div style="font-size: 20px; margin: 5px 0;">${weatherIcons[iconCode] || '🌤️'}</div>
                    <div class="forecast-temp">${temp}°C</div>
                `;

                forecastItems.appendChild(forecastItem);
            });
        }

        function formatDate(date) {
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            };
            return date.toLocaleDateString('en-US', options);
        }

        function formatDay(date) {
            const options = { weekday: 'short' };
            return date.toLocaleDateString('en-US', options);
        }

        function showLoading(show) {
            const loading = document.getElementById('loading');
            loading.style.display = show ? 'block' : 'none';
        }

        function showWeatherInfo() {
            const weatherInfo = document.getElementById('weatherInfo');
            weatherInfo.classList.add('show');
        }

        function hideWeatherInfo() {
            const weatherInfo = document.getElementById('weatherInfo');
            weatherInfo.classList.remove('show');
        }

        function showForecast() {
            const forecast = document.getElementById('forecast');
            forecast.classList.add('show');
        }

        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        function hideError() {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.style.display = 'none';
        }

        // Demo mode - shows sample data when no API key is provided
        function showDemoData() {
            const demoWeather = {
                name: 'London',
                sys: { country: 'GB' },
                main: {
                    temp: 22,
                    humidity: 65,
                    pressure: 1013
                },
                weather: [{ description: 'clear sky', icon: '01d' }],
                wind: { speed: 1.44 },
                visibility: 10000
            };

            displayWeather(demoWeather);
            showWeatherInfo();
            showForecast();

            // Demo forecast data
            const demoForecast = {
                list: [
                    { dt: Date.now() / 1000, main: { temp: 22 }, weather: [{ icon: '01d' }] },
                    { dt: (Date.now() + 86400000) / 1000, main: { temp: 20 }, weather: [{ icon: '02d' }] },
                    { dt: (Date.now() + 172800000) / 1000, main: { temp: 18 }, weather: [{ icon: '10d' }] },
                    { dt: (Date.now() + 259200000) / 1000, main: { temp: 21 }, weather: [{ icon: '01d' }] },
                    { dt: (Date.now() + 345600000) / 1000, main: { temp: 19 }, weather: [{ icon: '03d' }] }
                ]
            };

            displayForecast(demoForecast);
        }

        // Check if API key is set, if not show demo
        if (API_KEY === 'YOUR_API_KEY_HERE') {
            console.log('No API key provided. Running in demo mode.');
            showDemoData();
        }
    </script>
</body>
</html>
